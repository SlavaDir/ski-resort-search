version: "3.8"

services:
  ski-aggregator:
    build: .
    container_name: ski-resorts
    ports:
      - "5001:5001"
    volumes:
      - db_data:/app/data
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OLLAMA_URL=http://host.docker.internal:11434
    restart: unless-stopped

volumes:
  db_data:
