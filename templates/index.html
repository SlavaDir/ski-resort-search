<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ski Resorts Search</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.svg') }}" type="image/x-icon">
    <style>
        /* --- Floating Search Bar --- */
        .floating-search {
            display: flex;
            background: var(--surface);
            width: 100%;
            max-width: 900px;
            border-radius: var(--radius);
            padding: 0.5rem;
            box-shadow: var(--shadow-lift); 
            border: 1px solid var(--border);
            gap: 0.5rem;
        }

        .input-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            text-align: left;
            padding: 0.5rem 1rem;
            border-right: 1px solid var(--border);
        }

        .input-group:last-of-type { border-right: none; }
        .input-group label { font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); font-weight: 600; margin-bottom: 0.25rem;}
        
        .input-group select, .input-group input {
            border: none;
            background: transparent;
            font-size: 1rem; font-family: inherit; font-weight: 500;
            color: var(--text-main); outline: none; width: 100%;
        }

        /* --- Resort List Styles --- */
        .results-section { padding-bottom: 4rem; }
        .results-meta { margin-bottom: 1.5rem; font-size: 1.125rem; font-weight: 600;}

        .resort-list { display: flex; flex-direction: column; gap: 1rem; }

        .resort-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            box-shadow: var(--shadow-card);
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .resort-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lift);
            border-color: #d1d5db;
        }

        .card-main h3 { margin: 0 0 0.25rem 0; font-size: 1.3rem; }
        .card-main p { margin: 0; color: var(--text-muted); font-size: 0.875rem; }

        .card-metrics { display: flex; gap: 2rem; text-align: right; }
        .metric-block { display: flex; flex-direction: column; }
        .metric-value { font-weight: 600; font-size: 1.2rem; }
        .metric-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;}
    </style>
</head>
<body>

    <main class="container">
        <header class="main-header">
            <div class="segmented-control">
                <a href="/" class="active">Search</a>
                <a href="/admin">Admin Panel</a>
            </div>

            <h1>Find your perfect ski destination</h1>
            <p class="stats-info">Searching through {{ total }} resorts across {{ countries_count }} countries.</p>
            
            <div class="floating-search">
                <div class="input-group">
                    <label for="filterCountry">Destination</label>
                    <select id="filterCountry">
                        <option value="">Anywhere</option>
                        {% for c in countries %}
                        <option value="{{ c }}">{{ c }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="input-group">
                    <label for="filterPrice">Max Budget (€)</label>
                    <input type="number" id="filterPrice" placeholder="Any" min="0">
                </div>
                <div class="input-group">
                    <label for="filterTrails">Min Trails (km)</label>
                    <input type="number" id="filterTrails" placeholder="Any" min="0">
                </div>
                <button class="btn btn-primary" onclick="applyFilters()" style="padding: 0 2.5rem;">Search</button>
            </div>
        </header>

        <section class="results-section">
            <div class="results-meta" id="resultsCount">All Resorts</div>
            <div class="resort-list" id="resortList"></div>
        </section>
    </main>

    <div id="resortModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeModal()">×</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <footer class="footer">
        © 2026 Vladyslava Dirluhian
    </footer>

    <script>const ALL_RESORTS = {{ resorts_json | safe }};</script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
